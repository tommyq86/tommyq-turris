-- Local domain overrides for tommyq.cz
-- Block HTTPS/SVCB records first to prevent Chrome ECH errors
policy.add(function(state, req)
    local qry = req:current()
    local dominated = policy.suffix({todname('tommyq.cz')})
    if qry.stype == 65 and dominated(state, req) then
        return policy.DENY
    end
end)
-- Forward A/AAAA to local NAS DNS (resolves to 192.168.2.1)
policy.add(policy.suffix(policy.FORWARD('192.168.2.1'), {todname('tommyq.cz')}))
