# tommyq.cz/sport/ - Token-based access control
# admin token = full access + refresh button
# public token = view only (shareable links)
$HTTP["host"] == "tommyq.cz" {
    $HTTP["url"] =~ "^/sport" {
        $HTTP["querystring"] !~ "token=(vYOFavsNQi9MW4V3LbmuLQ|pub_H4CJq5JkYddcey4e)" {
            url.redirect = ( "" => "https://tommyq.cz/" )
        }
    }
    $HTTP["url"] =~ "^/sport/cgi/(refresh|delete)" {
        $HTTP["querystring"] !~ "token=vYOFavsNQi9MW4V3LbmuLQ" {
            url.redirect = ( "" => "https://tommyq.cz/" )
        }
    }
    $HTTP["url"] =~ "^/sport/cgi/" {
        cgi.assign = ( ".cgi" => "" )
    }
}
