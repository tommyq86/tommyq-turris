# Globální proměnné pro tommyq.cz
var.nas_ip = "192.168.2.4"

# tommyq.cz - Base domain configuration
# Redirect HTTP to HTTPS (except ca.crt)
$HTTP["scheme"] == "http" {
    $HTTP["host"] =~ "(^|\.)tommyq\.cz$" {
        $HTTP["url"] != "/ca.crt" {
            url.redirect = ( "^/(.*)" => "https://%0/$1" )
        }
    }
}

# HTTPS - Global SSL for tommyq.cz and *.tommyq.cz
$HTTP["host"] =~ "(^|\.)tommyq\.cz$" {
    ssl.pemfile = "/etc/ssl/certs/turris_combined.pem"
}

# HTTPS - Base domain specifics
$HTTP["host"] == "tommyq.cz" {
    # SmartHome assistant proxy (must be before alias to take priority)
    $HTTP["url"] =~ "^/(smarthome|oauth)" {
        proxy.server = ( "" => ( (
            "host" => "127.0.0.1",
            "port" => 3443
        ) ) )
        proxy.header = ( "https-remap" => "enable" )
    }

    # Static content (dashboard, sport, CA cert)
    $HTTP["url"] !~ "^/(smarthome|oauth)" {
        alias.url = ( "/ca.crt" => "/www/ca.crt", "/sport" => "/srv/tommyq/sport", "/" => "/www/tommyq/" )
        index-file.names = ( "index.html" )
    }
}
