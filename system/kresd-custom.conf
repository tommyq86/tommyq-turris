-- Local domain overrides for tommyq.cz
-- Block HTTPS/SVCB records to prevent Chrome ECH errors
-- Note: A/AAAA resolution handled by dnsmasq (/etc/dnsmasq.d/local-domains.conf)
policy.add(function(state, req)
    local qry = req:current()
    local qname = kres.dname2str(qry:name())
    if qname and string.find(qname, 'tommyq.cz') then
        if qry.stype == 65 then
            return policy.DENY
        end
    end
end)
